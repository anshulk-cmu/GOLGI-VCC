---
# image-resize (Non-OC)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-resize
  namespace: openfaas-fn
  labels:
    faas_function: image-resize
    app: image-resize
spec:
  replicas: 1
  selector:
    matchLabels:
      faas_function: image-resize
  template:
    metadata:
      labels:
        faas_function: image-resize
        app: image-resize
    spec:
      containers:
      - name: image-resize
        image: golgi/image-resize:v1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: write_timeout
          value: "60s"
        - name: read_timeout
          value: "60s"
        - name: exec_timeout
          value: "60s"
        - name: max_inflight
          value: "4"
        resources:
          requests:
            memory: "512Mi"
            cpu: "1000m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: image-resize
  namespace: openfaas-fn
  labels:
    faas_function: image-resize
    app: image-resize
spec:
  selector:
    faas_function: image-resize
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
